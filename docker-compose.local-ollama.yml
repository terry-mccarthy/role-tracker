services:
  app:
    build: .
    ports:
      - "3002:3000"
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DB_PATH=/app/data/pipeline.db
      # Uses Ollama running natively on the Mac host (GPU-accelerated).
      # Make sure Ollama is running: `ollama serve`
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./pipeline.db:/app/data/pipeline.db
      - ./config:/app/config:ro
    restart: unless-stopped

  mcp:
    build: .
    ports:
      - "3100:3100"
    environment:
      - MCP_PORT=3100
      - API_BASE_URL=http://app:3000
    command: ["node", "src/mcp/mcp-server-http.js"]
    restart: unless-stopped
    depends_on:
      - app
